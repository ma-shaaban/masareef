apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: masareef
spec:
  parentRefs:
    - name: cilium-gateway-https
      namespace: flux-system
      sectionName: https-wildcard # shared *.nezam.site listener
  hostnames:
    - masareef-staging.nezam.site
  rules:
    - backendRefs:
        - name: masareef
          port: 80
