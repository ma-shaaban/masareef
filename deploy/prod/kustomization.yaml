apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
images:
  - name: ghcr.io/ma-shaaban/masareef
    # Pinned by scripts/release.sh (release: vX.Y.Z commit + tag). Prod ships
    # ONLY tagged releases — Flux tracks semver tags, not main.
    newTag: 1.0.0
patches:
  - patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: masareef
      spec:
        hostnames:
          - masareef.nezam.site
